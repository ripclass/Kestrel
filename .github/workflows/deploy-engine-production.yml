name: Deploy Engine Production

on:
  push:
    branches:
      - main
    paths:
      - "engine/**"
      - "supabase/**"
      - ".github/workflows/deploy-engine-production.yml"
  workflow_dispatch:

concurrency:
  group: deploy-engine-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify Engine Before Deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev]

      - name: Bytecode compile
        run: python -m compileall app seed

      - name: Run smoke tests
        run: pytest -q

      - name: Verify demo seed summary
        run: python seed/run.py

  secrets:
    name: Detect Render Hooks
    runs-on: ubuntu-latest
    outputs:
      engine_configured: ${{ steps.detect.outputs.engine_configured }}
      worker_configured: ${{ steps.detect.outputs.worker_configured }}
      beat_configured: ${{ steps.detect.outputs.beat_configured }}
    steps:
      - name: Check hook availability
        id: detect
        shell: bash
        env:
          RENDER_ENGINE_DEPLOY_HOOK_URL: ${{ secrets.RENDER_ENGINE_DEPLOY_HOOK_URL }}
          RENDER_WORKER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_WORKER_DEPLOY_HOOK_URL }}
          RENDER_BEAT_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BEAT_DEPLOY_HOOK_URL }}
        run: |
          if [[ -n "$RENDER_ENGINE_DEPLOY_HOOK_URL" ]]; then
            echo "engine_configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "engine_configured=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -n "$RENDER_WORKER_DEPLOY_HOOK_URL" ]]; then
            echo "worker_configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "worker_configured=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -n "$RENDER_BEAT_DEPLOY_HOOK_URL" ]]; then
            echo "beat_configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "beat_configured=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-engine:
    name: Trigger Render API Deploy
    runs-on: ubuntu-latest
    needs:
      - verify
      - secrets
    if: needs.secrets.outputs.engine_configured == 'true'
    environment:
      name: production
    steps:
      - name: Trigger deploy hook
        shell: bash
        env:
          RENDER_ENGINE_DEPLOY_HOOK_URL: ${{ secrets.RENDER_ENGINE_DEPLOY_HOOK_URL }}
        run: |
          curl --fail --silent --show-error --request POST "${RENDER_ENGINE_DEPLOY_HOOK_URL}?ref=${GITHUB_SHA}"
          {
            echo "## Render API Deploy Triggered"
            echo "- Commit: $GITHUB_SHA"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-worker:
    name: Trigger Render Worker Deploy
    runs-on: ubuntu-latest
    needs:
      - verify
      - secrets
    if: needs.secrets.outputs.worker_configured == 'true'
    environment:
      name: production
    steps:
      - name: Trigger deploy hook
        shell: bash
        env:
          RENDER_WORKER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_WORKER_DEPLOY_HOOK_URL }}
        run: |
          curl --fail --silent --show-error --request POST "${RENDER_WORKER_DEPLOY_HOOK_URL}?ref=${GITHUB_SHA}"
          {
            echo "## Render Worker Deploy Triggered"
            echo "- Commit: $GITHUB_SHA"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-beat:
    name: Trigger Render Beat Deploy
    runs-on: ubuntu-latest
    needs:
      - verify
      - secrets
    if: needs.secrets.outputs.beat_configured == 'true'
    environment:
      name: production
    steps:
      - name: Trigger deploy hook
        shell: bash
        env:
          RENDER_BEAT_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BEAT_DEPLOY_HOOK_URL }}
        run: |
          curl --fail --silent --show-error --request POST "${RENDER_BEAT_DEPLOY_HOOK_URL}?ref=${GITHUB_SHA}"
          {
            echo "## Render Beat Deploy Triggered"
            echo "- Commit: $GITHUB_SHA"
          } >> "$GITHUB_STEP_SUMMARY"

  skipped:
    name: Missing Render Hooks
    runs-on: ubuntu-latest
    needs:
      - secrets
      - verify
    if: needs.secrets.outputs.engine_configured != 'true' || needs.secrets.outputs.worker_configured != 'true' || needs.secrets.outputs.beat_configured != 'true'
    steps:
      - name: Explain skipped deploy
        shell: bash
        run: |
          {
            echo "## Render Deploy Hooks"
            echo ""
            echo "Missing one or more optional GitHub secrets:"
            echo "- RENDER_ENGINE_DEPLOY_HOOK_URL"
            echo "- RENDER_WORKER_DEPLOY_HOOK_URL"
            echo "- RENDER_BEAT_DEPLOY_HOOK_URL"
            echo ""
            echo "Any service with a configured hook will still deploy."
          } >> "$GITHUB_STEP_SUMMARY"
