name: Deploy Web Production

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/deploy-web-production.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secrets:
    name: Detect Vercel Secrets
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.detect.outputs.configured }}
    steps:
      - name: Check required secrets
        id: detect
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [[ -n "$VERCEL_TOKEN" && -n "$VERCEL_ORG_ID" && -n "$VERCEL_PROJECT_ID" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy Vercel Production
    runs-on: ubuntu-latest
    needs: secrets
    if: needs.secrets.outputs.configured == 'true'
    environment:
      name: production
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@41.7.3

      - name: Pull production environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build prebuilt artifact
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        id: deploy
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          url="$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" | tail -n 1 | tr -d '\r')"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          {
            echo "## Vercel Production Deploy"
            echo "- URL: $url"
            echo "- Commit: $GITHUB_SHA"
          } >> "$GITHUB_STEP_SUMMARY"

  skipped:
    name: Missing Vercel Secrets
    runs-on: ubuntu-latest
    needs: secrets
    if: needs.secrets.outputs.configured != 'true'
    steps:
      - name: Explain skipped deploy
        run: |
          {
            echo "## Vercel Production Deploy Skipped"
            echo ""
            echo "Missing one or more required GitHub secrets:"
            echo "- VERCEL_TOKEN"
            echo "- VERCEL_ORG_ID"
            echo "- VERCEL_PROJECT_ID"
          } >> "$GITHUB_STEP_SUMMARY"
