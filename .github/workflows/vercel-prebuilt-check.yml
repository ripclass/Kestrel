name: Vercel Prebuilt Check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets:
    name: Detect Secrets
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.detect.outputs.configured }}
    steps:
      - name: Check required Vercel secrets
        id: detect
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [[ -n "$VERCEL_TOKEN" && -n "$VERCEL_ORG_ID" && -n "$VERCEL_PROJECT_ID" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Vercel secrets detected."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Missing VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID. Skipping prebuilt check."
          fi

  prebuilt:
    name: Build With Vercel CLI
    runs-on: ubuntu-latest
    needs: secrets
    if: needs.secrets.outputs.configured == 'true'
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@41.7.3

      - name: Pull preview environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build prebuilt artifact
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --token="$VERCEL_TOKEN"
