services:
  - type: web
    name: kestrel-engine
    env: python
    rootDir: engine
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port ${PORT}
  - type: worker
    name: kestrel-worker
    env: python
    rootDir: engine
    buildCommand: pip install -e .
    startCommand: celery -A app.tasks.celery_app.celery_app worker --loglevel=INFO
