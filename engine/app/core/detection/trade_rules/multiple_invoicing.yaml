code: multiple_invoicing
title: Multiple invoicing of same shipment
category: tbml
weight: 8.0
description: >
  Same Bill of Lading number — or same LC reference — appears on trade rows
  at multiple banks. Strong TBML signal: shipment is invoiced more than once
  to multiply the laundered amount. Maps to BFIU Alert #18 + the cross-bank
  intelligence dimension. Requires peer-trade context.
bfiu_avenue_ref: "2.4.1.iv"
predicate_offences:
  - smuggling_customs_excise
  - tax_related_offences
  - fraud

conditions:
  trigger: same_bl_or_lc_across_orgs
  params:
    # Minimum number of distinct orgs that must share the same B/L or LC
    # reference to trigger. Set to 2 — the moment we see two banks invoicing
    # the same shipment, surface it.
    min_distinct_orgs: 2

scoring:
  base: 70
  modifiers:
    - when: distinct_orgs >= 3
      add: 20
      reason: "Same B/L or LC reference at three or more banks"
    - when: bl_number_match == true
      add: 10
      reason: "B/L number matches across banks"
    - when: lc_reference_match == true
      add: 10
      reason: "LC reference matches across banks"
    - when: aggregate_invoice_value > 10000000
      add: 10
      reason: "Aggregate invoice value across the duplicated shipment exceeds 1 crore BDT equivalent"

severity:
  critical: 90
  high: 75
  medium: 65

alert_template:
  title: "Multiple invoicing: {trade_ref} — {match_key}"
  description: "B/L {bl_number} / LC {lc_reference} is invoiced at {distinct_orgs} banks with aggregate invoice {aggregate_invoice_value} {currency}."
