code: first_time_high_value
title: First-time high value
category: behavioral
weight: 4.0
description: >
  High-value transaction in a recently-opened account — single transaction
  above BDT 10 lakh from an account less than 30 days old to a beneficiary
  with no prior transaction history. Applies to individual and proprietorship
  accounts. Regulatory basis: BFIU Circular 26 § 4.3 (new-account monitoring) +
  FATF Recommendation 10 (Customer Due Diligence) + Wolfsberg AML Principles
  § 5.4 (initial-period activity monitoring).

conditions:
  trigger: new_beneficiary_high_value
  params:
    min_amount: 1000000
    max_account_age_days: 30
    no_prior_transactions_to_beneficiary: true

scoring:
  base: 50
  modifiers:
    - when: amount > 1000000
      add: 20
      reason: "Amount exceeds 10 lakh BDT"
    - when: beneficiary_at_different_bank == true
      add: 10
      reason: "Beneficiary is at a different bank"
    - when: account_age_days < 30
      add: 10
      reason: "Sender account is less than 30 days old"
    - when: beneficiary_is_flagged == true
      add: 15
      reason: "Beneficiary is a known flagged entity"

severity:
  critical: 90
  high: 70
  medium: 50

alert_template:
  title: "First-time high value: {account_name}"
  description: "BDT {amount} sent to new beneficiary {beneficiary_name} (account age {account_age} days)"
